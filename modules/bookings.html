<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header class="navbar">
    <h1>🏠 RentEase</h1>

    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="properties.html">Properties</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="adminpanel.html">Admin</a></li>
    </ul>

    <button id="darkToggle">🌙</button>
</header>

<h2 style="text-align:center;">Your Bookings</h2>

<div id="bookingList"></div>

<!-- CANCEL MODAL -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3>Cancel Booking?</h3>
        <p>Are you sure you want to cancel this booking?</p>
        <button id="confirmYes">Yes, Cancel</button>
        <button id="confirmNo">No</button>
    </div>
</div>

<script>

/* ================= LOAD BOOKINGS ================= */
async function loadBookings() {

    let container = document.getElementById("bookingList");
    container.innerHTML = "";

    try {
        let res = await fetch("https://rentease-backend-1.onrender.com/api/bookings")
        let bookings = await res.json();

        if (bookings.length === 0) {
            container.innerHTML = "<p>No bookings yet</p>";
            return;
        }

        bookings.forEach(b => {

            let div = document.createElement("div");
            div.classList.add("booking-card");

            div.innerHTML = `
                <h3>${b.title}</h3>
                <p>${b.location}</p>
                <p>Date: ${b.date}</p>
                <p>${b.status}</p>

                <button onclick="openCancelModal('${b._id}')">
                    Cancel Booking
                </button>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.log(error);
        alert("Failed to load bookings ❌");
    }
}

/* ================= CANCEL ================= */
let selectedBookingId = null;

function openCancelModal(id) {
    selectedBookingId = id;
    document.getElementById("confirmModal").style.display = "flex";
}

/* YES */
document.getElementById("confirmYes").onclick = async function () {

    await fetch(`https://rentease-backend-1.onrender.com/api/bookings/${selectedBookingId}`, {
        method: "DELETE"
    });

    document.getElementById("confirmModal").style.display = "none";

    alert("Booking Cancelled ❌");

    loadBookings();
};

/* NO */
document.getElementById("confirmNo").onclick = function () {
    document.getElementById("confirmModal").style.display = "none";
};

/* ================= DARK MODE ================= */
let toggle = document.getElementById("darkToggle");

toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
});

/* ================= LOAD ================= */
window.onload = loadBookings;

</script>

</body>
</html>
