<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="form-container">
    <h2>Payment Details</h2>

    <div id="propertyDetails"></div>

    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Card Holder Name">
    <input type="text" placeholder="Expiry Date">
    <input type="password" placeholder="CVV">

    <button onclick="completePayment()">Pay Now</button>
    <button onclick="cancelPayment()" style="background:red;color:white;">
        Cancel
    </button>
</div>

<script>
let selectedBookingId = null;
/* LOAD BOOKINGS */
async function loadBookings() {

    let container = document.getElementById("bookingList");
    container.innerHTML = "";

    try {
        let res = await fetch("https://rentease-backend-1.onrender.com/api/bookings");
        let bookings = await res.json();

        if (bookings.length === 0) {
            container.innerHTML = "<p>No bookings yet</p>";
            return;
        }

        bookings.forEach(b => {

            let div = document.createElement("div");
            div.classList.add("booking-card");

            div.innerHTML = `
                <h3>${b.title}</h3>
                <p>${b.location}</p>
                <p>Date: ${b.date}</p>
                <p>${b.status}</p>

                <button onclick="openCancelModal('${b._id}')">
                    Cancel Booking
                </button>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.log(error);
        alert("Failed to load bookings ❌");
    }
}

/* OPEN MODAL */
function openCancelModal(id) {
    selectedBookingId = id;
    document.getElementById("confirmModal").style.display = "flex";
}

/* YES CANCEL */
document.getElementById("confirmYes").onclick = async function () {

    await fetch(`https://rentease-backend-1.onrender.com/api/bookings/${selectedBookingId}`, {
        method: "DELETE"
    });

    document.getElementById("confirmModal").style.display = "none";

    alert("Booking Cancelled ❌");

    loadBookings();
};

/* NO CANCEL */
document.getElementById("confirmNo").onclick = function () {
    document.getElementById("confirmModal").style.display = "none";
};

/* LOAD ON START */
window.onload = function () {
    setTimeout(loadBookings, 2000); // render delay fix
};
</script>
</body>
</html>
